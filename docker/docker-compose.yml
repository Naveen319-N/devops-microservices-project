version: "3.8"

services:
  backend:
    build: ../backend
    container_name: backend
    ports:
      - "3000:3000"

  auth:
    build: ../auth-service
    container_name: auth
    ports:
      - "3001:3001"

  frontend:
    build: ../frontend
    container_name: frontend
    ports:
      - "80:80"